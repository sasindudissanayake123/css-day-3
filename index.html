<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS day 3</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .one, .two, .three, .four, .five{
            padding: 20px;
            text-align: center;
            font-size: 36px;
            color: rgb(0, 0, 0);
            font-weight: bold;
        }
        .one{
            background-color: rgb(68, 0, 255);
            font-size: 100px;
        }
        .two{
            background-color: rgb(255, 242, 0);
            font-size: 100px;
        }
        .three{
            background-color: rgb(255, 47, 47);
            font-size: 100px;
        }
        .four{
            background-color: rgb(255, 255, 255);
            font-size: 100px;
        }
        .five{
            background-color: orange;
            font-size: 100px;
        }
        .flexblox{
            display: flex;
            flex-wrap: wrap;
            height: 500px;
            
        }
    </style>
</head>

<body>
    <div class="flexblox">
    <p class="one">A</p>
    <P class="two">B</P>
    <P class="three">C</P>
    <p class="four">D</p>
    <p class="five">E</p>
    </div>

   
    

</body>

</html>
