<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS day 3</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .one, .two, .three, .four{
            padding: 20px;
            text-align: center;
            font-size: 36px;
            color: blue;
            font-weight: bold;
        }
        .one{
            background-color: aqua;
        }
        .two{
            background-color: red;
        }
        .three{
            background-color: greenyellow;
        }
        .four{
            background-color: chartreuse;
        }
        .flexblox{
            border: 2px solid;
        }
    </style>
</head>

<body>
    <div class="flexblox">
    <p class="one">A</p>
    <P class="two">B</P>
    <P class="three">C</P>
    <p class="four">D</p>
    </div>
    

</body>

</html>
