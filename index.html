<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS day 3</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .one, .two, .three, .four{
            padding: 20px;
            text-align: center;
            font-size: 36px;
            color: rgb(0, 0, 0);
            font-weight: bold;
        }
        .one{
            background-color: aqua;
            font-size: 35px;
        }
        .two{
            background-color: red;
            font-size: 50px;
        }
        .three{
            background-color: greenyellow;
            font-size: 75px;
        }
        .four{
            background-color: chartreuse;
            font-size: 100px;
        }
        .flexblox{
            border: 2px solid;
            display: flex;
            height: 300px;
            align-items: flex-start;
            align-items: flex-end;
            align-items: center;
            align-items: stretch;
            align-items: baseline;
            align-items: normal
            ;
        }
    </style>
</head>

<body>
    <div class="flexblox">
    <p class="one">A</p>
    <P class="two">B</P>
    <P class="three">C</P>
    <p class="four">D</p>
    </div>

   
    

</body>

</html>
